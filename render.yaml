services:
  - type: web
    name: sturent-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --no-input --settings=sturent.settings.production && python manage.py migrate --settings=sturent.settings.production
    startCommand: cd backend && gunicorn sturent.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: sturent-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: sturent.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sturent-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sturent.mirzashafi.com

  - type: pserv
    name: sturent-db
    plan: free
    databaseName: sturent_db
    databaseUser: sturent_user
